# Runs @regression tests once per week. GitHub Actions cron is UTC only.
# Default: Fridays 05:00 UTC. For India (IST) Friday 10:30, use: cron: '0 5 * * 5' -> adjust as needed.
#
# Email report: Allure single-file HTML attached directly (typically 1-5 MB, well under Gmail 25 MB limit).
# Gmail SMTP (smtp.gmail.com:587 + STARTTLS). Same secrets as smoke-scheduled.yml -- use Repository secrets only.
# Settings > Secrets and variables > Actions > New repository secret:
#   GMAIL_USERNAME      test.addagames1@gmail.com  (SMTP login + From address)
#   GMAIL_APP_PASSWORD  MUST be a 16-character Google App Password -- NOT the regular account password.
#                       Google disabled plain-password SMTP auth on March 14, 2025.
#                       To generate: myaccount.google.com > Security > 2-Step Verification (enable first)
#                                    > App Passwords > Mail > copy the 16-char code and store without spaces.
#   OUTLOOK_EMAIL       bikash.mazumder@growexx.com  (To - report recipient)
# If secrets are missing or SMTP auth fails, the email step fails softly (continue-on-error: true).
# Check the "Check email secrets" step in the Actions log to confirm all three secrets are set.
name: Regression tests (weekly)

on:
  schedule:
    # Every Friday at 05:00 UTC
    - cron: '0 5 * * 5'
  workflow_dispatch:

jobs:
  regression:
    timeout-minutes: 360
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      # list = prints each test as a separate log line in GitHub Actions.
      # allure-playwright reporter (configured in playwright.config.js) writes to allure-results/.
      - name: Run regression tests
        id: regression_tests
        env:
          CI: true
          FORCE_COLOR: '0'
        run: npx playwright test --grep '@regression' --project=chromium --reporter=list

      - name: Set up Java (required by allure-commandline)
        if: always() && !cancelled()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate Allure single-file HTML report
        if: always() && !cancelled()
        run: npx allure generate allure-results --single-file --clean -o allure-report

      - name: Upload Allure report artifact
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: allure-regression-report
          path: allure-report/
          retention-days: 30

      - name: Check email secrets
        if: always() && !cancelled()
        run: |
          echo "GMAIL_USERNAME set: ${{ secrets.GMAIL_USERNAME != '' }}"
          echo "GMAIL_APP_PASSWORD set: ${{ secrets.GMAIL_APP_PASSWORD != '' }}"
          echo "OUTLOOK_EMAIL set: ${{ secrets.OUTLOOK_EMAIL != '' }}"

      - name: Email Allure report
        if: always() && !cancelled()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: '[Regression] ${{ steps.regression_tests.outcome }} -- ${{ github.repository }} #${{ github.run_number }}'
          to: ${{ secrets.OUTLOOK_EMAIL }}
          from: ${{ secrets.GMAIL_USERNAME }}
          body: |
            Regression tests finished with outcome: ${{ steps.regression_tests.outcome }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The Allure report is attached as a single self-contained HTML file.
            Open it directly in any browser -- no server or unzip required.
          attachments: allure-report/index.html
