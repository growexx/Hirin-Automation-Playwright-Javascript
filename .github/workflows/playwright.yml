# Push/PR: smoke tests only, single browser (avoids ~297 tests × 4 projects ≈ 1188 runs).
#
# Live test names in the Actions log: enabled via --reporter=list (updates as each test runs).
#
# Email report: attach only when raw HTML is small enough that base64+MIME stays under Gmail's ~25 MB cap (~18 MiB raw).
# Gmail SMTP (smtp.gmail.com:587 + STARTTLS). Same secrets as smoke-scheduled.yml -- use Repository secrets only.
# Settings > Secrets and variables > Actions > New repository secret:
#   GMAIL_USERNAME      your-sender@gmail.com  (SMTP login + From address)
#   GMAIL_APP_PASSWORD  MUST be a 16-character Google App Password -- NOT the regular account password.
#                       Google disabled plain-password SMTP auth on March 14, 2025.
#                       To generate: myaccount.google.com > Security > 2-Step Verification (enable first)
#                                    > App Passwords > Mail > copy the 16-char code and store without spaces.
#   OUTLOOK_EMAIL       recipient@example.com  (To - report recipient)
# If secrets are missing or SMTP auth fails, the email steps fail softly (continue-on-error: true).
# Check the "Check email secrets" step in the Actions log to confirm all three secrets are set.
name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 120
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      # Early SMTP check using the same secrets as the report emails (Gmail + recipient).
      - name: Send SMTP test email (pre-run)
        continue-on-error: true
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: '[Playwright CI] SMTP test -- ${{ github.repository }} #${{ github.run_number }}'
          to: ${{ secrets.OUTLOOK_EMAIL }}
          from: ${{ secrets.GMAIL_USERNAME }}
          body: |
            This is an automated connectivity check from the push/PR Playwright workflow.

            If you received this message, Gmail SMTP (smtp.gmail.com:587) and the configured secrets are working before smoke tests run.

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # list = prints each test as a separate log line in GitHub Actions.
      # allure-playwright reporter (configured in playwright.config.js) writes to allure-results/.
      - name: Run smoke tests
        id: smoke_tests
        env:
          CI: true
          FORCE_COLOR: '0'
        run: npx playwright test --grep '@smoke' --project=chromium --reporter=list

      - name: Set up Java (required by allure-commandline)
        if: always() && !cancelled()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Safety net: drop video/trace blobs so they are not base64-embedded in single-file HTML.
      - name: Strip heavy blobs from Allure results
        if: always() && !cancelled()
        run: |
          if [ -d allure-results ]; then
            find allure-results -type f \( -name '*.webm' -o -name '*.zip' \) -delete
          fi

      - name: Generate Allure single-file HTML report
        if: always() && !cancelled()
        run: npx allure generate allure-results --single-file --clean -o allure-report

      - name: Allure report size (email attachment gate)
        id: allure_report
        if: always() && !cancelled()
        run: |
          # Gmail send limit is ~25 MB for the whole message; MIME base64 grows ~33%, so cap raw file ~18 MiB.
          MAX_RAW=$((18 * 1024 * 1024))
          if [ ! -f allure-report/index.html ]; then
            echo "attach=false" >> "$GITHUB_OUTPUT"
            echo "bytes=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SIZE=$(stat -c%s allure-report/index.html)
          echo "bytes=$SIZE" >> "$GITHUB_OUTPUT"
          if [ "$SIZE" -le "$MAX_RAW" ]; then
            echo "attach=true" >> "$GITHUB_OUTPUT"
          else
            echo "attach=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Allure report artifact
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: allure-playwright-ci-report
          path: allure-report/
          retention-days: 14

      - name: Check email secrets
        if: always() && !cancelled()
        run: |
          echo "GMAIL_USERNAME set:     ${{ secrets.GMAIL_USERNAME != '' }}"
          echo "GMAIL_APP_PASSWORD set: ${{ secrets.GMAIL_APP_PASSWORD != '' }}"
          echo "OUTLOOK_EMAIL set:      ${{ secrets.OUTLOOK_EMAIL != '' }}"

      - name: Email Allure report (with attachment)
        if: always() && !cancelled() && steps.allure_report.outputs.attach == 'true'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: '[Playwright CI] ${{ steps.smoke_tests.outcome }} -- ${{ github.repository }} #${{ github.run_number }}'
          to: ${{ secrets.OUTLOOK_EMAIL }}
          from: ${{ secrets.GMAIL_USERNAME }}
          body: |
            Push/PR smoke tests finished with outcome: ${{ steps.smoke_tests.outcome }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The Allure report is attached as a single self-contained HTML file (${{ steps.allure_report.outputs.bytes }} bytes).
            Open it directly in any browser -- no server or unzip required.
          attachments: allure-report/index.html

      - name: Email Allure report (no attachment — report too large)
        if: always() && !cancelled() && steps.allure_report.outputs.attach != 'true'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: '[Playwright CI] ${{ steps.smoke_tests.outcome }} -- ${{ github.repository }} #${{ github.run_number }}'
          to: ${{ secrets.OUTLOOK_EMAIL }}
          from: ${{ secrets.GMAIL_USERNAME }}
          body: |
            Push/PR smoke tests finished with outcome: ${{ steps.smoke_tests.outcome }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The generated Allure HTML report is ${{ steps.allure_report.outputs.bytes }} bytes (too large for a reliable Gmail SMTP attachment once MIME/base64 overhead is applied; limit ~18 MiB raw).
            Download it from the workflow artifact "allure-playwright-ci-report" on the run page above.

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
