# Runs @smoke tests on a schedule. GitHub cron uses UTC only (no one-shot "tomorrow").
# Schedule: Monday-Thursday only (day-of-week 1-4). Time: 05:00 UTC (cron below).
# For India (IST) ~10:30 on those weekdays, use e.g. cron: '30 5 * * 1-4' and adjust as needed.
# First run: next calendar trigger after you push (next Mon-Thu after 05:00 UTC).
#
# Live test names in the Actions log: enabled via --reporter=line (updates as each test runs).
#
# Email report: Gmail SMTP (smtp.gmail.com:587 + STARTTLS). Do not put passwords in this file -- use Repository secrets only.
# Settings > Secrets and variables > Actions > New repository secret:
#   GMAIL_USERNAME      test.addagames1@gmail.com  (SMTP login + From address)
#   GMAIL_APP_PASSWORD  MUST be a 16-character Google App Password -- NOT the regular account password.
#                       Google disabled plain-password SMTP auth on March 14, 2025.
#                       To generate: myaccount.google.com > Security > 2-Step Verification (enable first)
#                                    > App Passwords > Mail > copy the 16-char code and store without spaces.
#   OUTLOOK_EMAIL       bikash.mazumder@growexx.com  (To - report recipient)
# If the HTML report is missing, a small stub ZIP is still attached so the email step always runs.
# If secrets are missing or SMTP auth fails, the email step fails softly (continue-on-error: true).
# Check the "Check email secrets" step in the Actions log to confirm all three secrets are set.
name: Smoke tests (scheduled)

on:
  schedule:
    # Mon-Thu only (1-4); 05:00 UTC
    - cron: '0 5 * * 1-4'
  workflow_dispatch:

jobs:
  smoke:
    timeout-minutes: 120
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      # list = prints each test as a separate log line in GitHub Actions.
      # html = playwright-report/ for the artifact and email attachment.
      - name: Run smoke tests
        id: smoke_tests
        env:
          CI: true
          FORCE_COLOR: '0'
        run: npx playwright test --grep '@smoke' --project=chromium --reporter=list --reporter=html

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 14

      - name: Zip Playwright HTML report
        id: zip_report
        if: always() && !cancelled()
        run: |
          rm -f playwright-smoke-report.zip
          if [ -d playwright-report ] && [ -f playwright-report/index.html ]; then
            zip -r -q playwright-smoke-report.zip playwright-report
            echo "Packed Playwright HTML report for email."
          else
            echo "No HTML report (playwright-report/index.html missing); attaching stub ZIP so email still sends."
            mkdir -p .smoke-email-stub
            {
              echo "No Playwright HTML report was produced for this run (early failure or reporter did not write playwright-report/index.html)."
              echo "Open the workflow run below for logs and the uploaded artifact if present."
            } > .smoke-email-stub/README.txt
            zip -r -q playwright-smoke-report.zip .smoke-email-stub
          fi

      - name: Check email secrets
        if: always() && !cancelled()
        run: |
          echo "GMAIL_USERNAME set: ${{ secrets.GMAIL_USERNAME != '' }}"
          echo "GMAIL_APP_PASSWORD set: ${{ secrets.GMAIL_APP_PASSWORD != '' }}"
          echo "OUTLOOK_EMAIL set: ${{ secrets.OUTLOOK_EMAIL != '' }}"

      - name: Email Playwright report
        if: always() && !cancelled()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: '[Smoke] ${{ steps.smoke_tests.outcome }} -- ${{ github.repository }} #${{ github.run_number }}'
          to: ${{ secrets.OUTLOOK_EMAIL }}
          from: ${{ secrets.GMAIL_USERNAME }}
          body: |
            Scheduled smoke tests finished with outcome: ${{ steps.smoke_tests.outcome }}

            Attachment: full HTML report (playwright-report/) when available; otherwise a README-only stub ZIP.

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: playwright-smoke-report.zip
